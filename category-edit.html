<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>编辑栏目 — InkFlow Admin</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.css"
    />

    <link rel="stylesheet" href="admin.css" />
  </head>
  <body>
    <!-- SIDEBAR -->
    <nav id="sidebar">
      <a class="sidebar-logo" href="dashboard.html">
        <div class="sidebar-logo-icon"><i class="bi bi-journals"></i></div>
        <div class="sidebar-logo-text">
          <span class="sidebar-logo-title">InkFlow</span>
          <span class="sidebar-logo-sub">Blog CMS</span>
        </div>
      </a>
      <div class="sidebar-nav-wrap">
        <div class="nav-section-label">主菜单</div>
        <div class="nav-item-wrapper">
          <a href="dashboard.html" class="nav-link-item" data-tooltip="仪表盘">
            <i class="bi bi-grid-1x2 nav-icon"></i
            ><span class="nav-label">仪表盘</span>
          </a>
        </div>
        <div class="nav-section-label">内容管理</div>
        <div class="nav-item-wrapper">
          <button
            class="nav-link-item active"
            data-toggle="submenu"
            data-target="sub-content"
            aria-expanded="true"
            data-tooltip="内容管理"
          >
            <i class="bi bi-file-richtext nav-icon"></i
            ><span class="nav-label">内容管理</span>
            <i class="bi bi-chevron-right nav-arrow"></i>
          </button>
        </div>
        <div class="submenu-wrap" id="sub-content">
          <div class="submenu">
            <div class="nav-item-wrapper">
              <a href="post-list.html" class="nav-link-item"
                ><i class="bi bi-file-text nav-icon"></i
                ><span class="nav-label">文章列表</span></a
              >
            </div>
            <div class="nav-item-wrapper">
              <a href="comment-list.html" class="nav-link-item"
                ><i class="bi bi-chat-left-dots nav-icon"></i
                ><span class="nav-label">评论列表</span></a
              >
            </div>
            <div class="nav-item-wrapper">
              <a href="category-list.html" class="nav-link-item active"
                ><i class="bi bi-folder2 nav-icon"></i
                ><span class="nav-label">栏目列表</span></a
              >
            </div>
            <div class="nav-item-wrapper">
              <a href="tag-list.html" class="nav-link-item"
                ><i class="bi bi-tags nav-icon"></i
                ><span class="nav-label">标签管理</span></a
              >
            </div>
          </div>
        </div>
        <div class="nav-section-label">媒体</div>
        <div class="nav-item-wrapper">
          <button
            class="nav-link-item"
            data-toggle="submenu"
            data-target="sub-media"
            aria-expanded="false"
            data-tooltip="媒体管理"
          >
            <i class="bi bi-collection nav-icon"></i
            ><span class="nav-label">媒体管理</span>
            <i class="bi bi-chevron-right nav-arrow"></i>
          </button>
        </div>
        <div class="submenu-wrap" id="sub-media">
          <div class="submenu">
            <div class="nav-item-wrapper">
              <a href="image-list.html" class="nav-link-item"
                ><i class="bi bi-images nav-icon"></i
                ><span class="nav-label">图片管理</span></a
              >
            </div>
            <div class="nav-item-wrapper">
              <a href="link-list.html" class="nav-link-item"
                ><i class="bi bi-link-45deg nav-icon"></i
                ><span class="nav-label">链接管理</span></a
              >
            </div>
          </div>
        </div>
        <div class="nav-section-label">系统</div>
        <div class="nav-item-wrapper">
          <a href="user-list.html" class="nav-link-item" data-tooltip="用户管理"
            ><i class="bi bi-people nav-icon"></i
            ><span class="nav-label">用户管理</span></a
          >
        </div>
        <div class="nav-item-wrapper">
          <a href="settings.html" class="nav-link-item" data-tooltip="系统设置"
            ><i class="bi bi-sliders nav-icon"></i
            ><span class="nav-label">系统设置</span></a
          >
        </div>
      </div>
      <div class="sidebar-footer">
        <div class="sidebar-user">
          <div class="sidebar-user-avatar">AD</div>
          <div class="sidebar-user-info">
            <div class="sidebar-user-name">Admin</div>
            <div class="sidebar-user-role">超级管理员</div>
          </div>
        </div>
      </div>
    </nav>
    <div id="sidebar-overlay"></div>
    <div id="main-wrapper">
      <!-- TOPBAR -->
      <header id="topbar">
        <button id="sidebar-toggle" title="收起/展开菜单">
          <i class="bi bi-layout-sidebar-inset"></i>
        </button>
        <div class="topbar-breadcrumb">
          <a
            href="dashboard.html"
            style="color: var(--ci-gray-500); text-decoration: none"
            >InkFlow</a
          ><span class="bc-sep"
            ><i
              class="bi bi-chevron-right"
              style="font-size: 0.65rem"
            ></i></span
          ><a
            href="category-list.html"
            style="color: var(--ci-gray-500); text-decoration: none"
            >栏目列表</a
          ><span class="bc-sep"
            ><i
              class="bi bi-chevron-right"
              style="font-size: 0.65rem"
            ></i></span
          ><span class="bc-current">编辑栏目</span>
        </div>
        <div class="topbar-search">
          <i class="bi bi-search search-icon"></i>
          <input type="text" id="list-search" placeholder="快速搜索…" />
        </div>
        <div class="topbar-actions">
          <button
            class="topbar-icon-btn"
            style="position: relative"
            title="通知"
          >
            <i class="bi bi-bell"></i><span class="ci-notif-badge">4</span>
          </button>

          <div class="dropdown topbar-dropdown ms-1">
            <button
              class="topbar-user-btn"
              data-bs-toggle="dropdown"
              aria-expanded="false"
              style="border: none"
            >
              <div class="topbar-avatar">AD</div>
              <span class="topbar-user-name d-none d-md-inline">Admin</span>
            </button>
            <ul class="dropdown-menu dropdown-menu-end">
              <li>
                <div class="user-info-header">
                  <div class="user-info-avatar">AD</div>
                  <div>
                    <div class="user-info-name">Admin User</div>
                    <div class="user-info-email">admin@inkflow.dev</div>
                  </div>
                </div>
              </li>
              <li>
                <a class="dropdown-item" href="#"
                  ><i class="bi bi-person-circle"></i> 个人资料</a
                >
              </li>
              <li>
                <a class="dropdown-item" href="#"
                  ><i class="bi bi-shield-check"></i> 账号安全</a
                >
              </li>
              <li><hr class="dropdown-divider" /></li>
              <li>
                <a
                  class="dropdown-item"
                  href="login.html"
                  style="color: #ef4444"
                  ><i class="bi bi-box-arrow-right"></i> 退出登录</a
                >
              </li>
            </ul>
          </div>
        </div>
      </header>
      <main id="page-content">
        <div class="page-header">
          <div>
            <h1 class="page-title">编辑栏目</h1>
          </div>
          <a href="category-list.html" class="btn btn-light"
            ><i class="bi bi-arrow-left"></i> 返回列表</a
          >
        </div>
        <div class="row g-3">
          <div class="col-12 col-xl-8">
            <div class="ci-panel ci-anim">
              <div class="ci-panel-header">
                <i class="bi bi-folder2-open"></i> 基本信息
              </div>
              <div class="ci-panel-body">
                <div class="row g-3">
                  <div class="col-12">
                    <label class="form-label"
                      >栏目名称 <span class="text-danger">*</span></label
                    >
                    <input
                      type="text"
                      class="form-control"
                      value="前端技术"
                      placeholder="请输入栏目名称"
                    />
                  </div>
                  <div class="col-12 col-md-6">
                    <label class="form-label">URL Slug</label>
                    <div class="input-group">
                      <span class="input-group-text" style="font-size: 0.78rem"
                        >/</span
                      >
                      <input
                        type="text"
                        class="form-control"
                        value="frontend-tech"
                        placeholder="url-slug"
                      />
                    </div>
                    <div class="ci-form-hint">
                      用于 URL 中的标识符，建议英文小写加横线
                    </div>
                  </div>
                  <div class="col-12 col-md-6">
                    <label class="form-label">父级栏目</label>
                    <select class="form-select">
                      <option value="" selected>无（顶级栏目）</option>
                      <option>前端技术</option>
                      <option>AI 技术</option>
                    </select>
                  </div>
                  <div class="col-12">
                    <label class="form-label">栏目描述</label>
                    <textarea
                      class="form-control"
                      rows="3"
                      placeholder="简短描述该栏目的内容方向…"
                    >
专注前端开发技术分享，涵盖 HTML、CSS、JavaScript、Vue、React 等主流技术的深度教程与实践经验。</textarea
                    >
                  </div>
                  <div class="col-12 col-md-6">
                    <label class="form-label">排序权重</label>
                    <input type="number" class="form-control" value="100" />
                    <div class="ci-form-hint">数值越大越靠前</div>
                  </div>
                  <div class="col-12 col-md-6">
                    <label class="form-label">状态</label>
                    <div
                      class="d-flex align-items-center gap-3"
                      style="height: 38px"
                    >
                      <div class="form-check form-switch mb-0">
                        <input
                          class="form-check-input"
                          type="checkbox"
                          id="cat-status"
                          checked
                        />
                        <label
                          class="form-check-label"
                          for="cat-status"
                          style="font-size: 0.82rem"
                          >启用该栏目</label
                        >
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>

            <!-- SEO -->
            <div class="ci-panel ci-anim" style="--ci-delay: 0.1s">
              <div class="ci-panel-header">
                <i class="bi bi-search-heart"></i> SEO 设置
              </div>
              <div class="ci-panel-body">
                <div class="row g-3">
                  <div class="col-12">
                    <label class="form-label">SEO 标题</label>
                    <input
                      type="text"
                      class="form-control"
                      value="前端技术 | InkFlow 博客"
                    />
                  </div>
                  <div class="col-12">
                    <label class="form-label">Meta 描述</label>
                    <textarea class="form-control" rows="2">
专注前端开发技术分享的博客栏目，包含 Vue、React、TypeScript 等主流框架的深度教程。</textarea
                    >
                  </div>
                </div>
              </div>
            </div>

            <div class="d-flex gap-2">
              <button
                class="btn btn-primary"
                onclick="showToast('栏目保存成功', 'success')"
              >
                <i class="bi bi-check-lg me-1"></i>保存栏目
              </button>
              <button
                class="btn btn-light"
                onclick="window.location = 'category-list.html'"
              >
                取消
              </button>
            </div>
          </div>

          <div class="col-12 col-xl-4">
            <div class="ci-panel ci-anim" style="--ci-delay: 0.05s">
              <div class="ci-panel-header">
                <i class="bi bi-image"></i> 栏目封面
              </div>
              <div class="ci-panel-body">
                <div
                  class="ci-cover-preview"
                  id="cover-preview"
                  style="aspect-ratio: 16/9"
                >
                  <img
                    src="https://picsum.photos/seed/cat1/400/225"
                    alt="封面"
                  />
                  <div class="ci-cover-overlay">
                    <i class="bi bi-arrow-repeat"></i> 更换图片
                  </div>
                </div>
                <input
                  type="file"
                  id="cover-file-input"
                  accept="image/*"
                  style="display: none"
                />
                <div class="d-flex gap-2 mt-2">
                  <button
                    class="btn btn-light btn-sm flex-fill"
                    onclick="
                      document.getElementById('cover-file-input').click()
                    "
                  >
                    <i class="bi bi-upload me-1"></i>上传
                  </button>
                  <button
                    class="btn btn-light btn-sm flex-fill"
                    onclick="showToast('已从媒体库选择', 'info')"
                  >
                    <i class="bi bi-collection me-1"></i>媒体库
                  </button>
                </div>
              </div>
            </div>
            <div class="ci-panel ci-anim" style="--ci-delay: 0.15s">
              <div class="ci-panel-header">
                <i class="bi bi-bar-chart-line"></i> 栏目统计
              </div>
              <div class="ci-panel-body">
                <div
                  class="d-flex flex-column gap-2"
                  style="font-size: 0.82rem"
                >
                  <div
                    class="d-flex justify-content-between py-1"
                    style="border-bottom: 1px solid var(--ci-gray-100)"
                  >
                    <span class="text-muted">文章总数</span><strong>286</strong>
                  </div>
                  <div
                    class="d-flex justify-content-between py-1"
                    style="border-bottom: 1px solid var(--ci-gray-100)"
                  >
                    <span class="text-muted">已发布</span><strong>241</strong>
                  </div>
                  <div
                    class="d-flex justify-content-between py-1"
                    style="border-bottom: 1px solid var(--ci-gray-100)"
                  >
                    <span class="text-muted">草稿</span><strong>45</strong>
                  </div>
                  <div class="d-flex justify-content-between py-1">
                    <span class="text-muted">创建时间</span
                    ><strong>2025-01-10</strong>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </main>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="admin.js"></script>
  </body>
</html>
