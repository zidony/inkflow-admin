<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>登录 — InkFlow</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.css"
    />
    <link rel="stylesheet" href="admin.css" />
  </head>
  <body style="margin: 0; padding: 0">
    <div class="ci-login-page">
      <div class="ci-login-dots"></div>
      <!-- decorative blobs -->
      <div
        style="
          position: absolute;
          width: 300px;
          height: 300px;
          border-radius: 50%;
          background: rgba(13, 110, 204, 0.08);
          top: -80px;
          right: -80px;
          pointer-events: none;
        "
      ></div>
      <div
        style="
          position: absolute;
          width: 200px;
          height: 200px;
          border-radius: 50%;
          background: rgba(6, 182, 212, 0.06);
          bottom: 40px;
          left: 40px;
          pointer-events: none;
        "
      ></div>

      <div class="ci-login-card">
        <!-- Logo -->
        <div class="ci-login-logo">
          <div class="ci-login-logo-icon"><i class="bi bi-journals"></i></div>
          <div>
            <div class="ci-login-logo-name">InkFlow</div>
            <div class="ci-login-logo-tag">Blog CMS · Admin</div>
          </div>
        </div>

        <h2 class="ci-login-title">欢迎回来 👋</h2>
        <p class="ci-login-subtitle">请登录您的管理员账号以继续</p>

        <div
          id="login-error"
          style="
            display: none;
            background: #fee2e2;
            border: 1px solid #fecaca;
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 0.82rem;
            color: #dc2626;
            margin-bottom: 14px;
          "
        >
          <i class="bi bi-exclamation-circle me-1"></i
          >用户名或密码错误，请重试。
        </div>

        <div class="ci-login-input-wrap">
          <i class="bi bi-person ci-input-icon"></i>
          <input
            type="text"
            id="login-user"
            placeholder="用户名 / 邮箱"
            autocomplete="username"
            value="admin"
          />
        </div>
        <div class="ci-login-input-wrap">
          <i class="bi bi-lock ci-input-icon"></i>
          <input
            type="password"
            id="login-pass"
            placeholder="登录密码"
            autocomplete="current-password"
            value="••••••••"
          />
          <button class="ci-eye-btn" id="eye-btn" onclick="togglePwd()">
            <i class="bi bi-eye-slash" id="eye-icon"></i>
          </button>
        </div>

        <div
          class="d-flex align-items-center justify-content-between mb-3"
          style="font-size: 0.8rem"
        >
          <div class="form-check mb-0">
            <input
              class="form-check-input"
              type="checkbox"
              id="remember"
              checked
            />
            <label
              class="form-check-label"
              for="remember"
              style="color: var(--ci-gray-600)"
              >记住我 7 天</label
            >
          </div>
          <a
            href="#"
            style="
              color: var(--ci-500);
              text-decoration: none;
              font-weight: 600;
            "
            >忘记密码？</a
          >
        </div>

        <button class="ci-login-btn" id="login-btn" onclick="doLogin()">
          <i class="bi bi-box-arrow-in-right"></i> 登录后台
        </button>

        <div class="ci-login-footer">
          <p style="margin: 0">
            © 2025 InkFlow · <a href="#">隐私政策</a> · <a href="#">使用条款</a>
          </p>
          <p
            style="
              margin: 4px 0 0;
              font-size: 0.72rem;
              color: var(--ci-gray-400);
            "
          >
            v1.1.0 ·
            <a href="#" style="color: var(--ci-gray-400)">查看更新日志</a>
          </p>
        </div>
      </div>
    </div>

    <script>
      function togglePwd() {
        var inp = document.getElementById("login-pass");
        var icon = document.getElementById("eye-icon");
        if (inp.type === "password") {
          inp.type = "text";
          icon.className = "bi bi-eye";
        } else {
          inp.type = "password";
          icon.className = "bi bi-eye-slash";
        }
      }
      function doLogin() {
        var btn = document.getElementById("login-btn");
        var err = document.getElementById("login-error");
        var user = document.getElementById("login-user").value.trim();
        var pass = document.getElementById("login-pass").value;
        err.style.display = "none";
        btn.disabled = true;
        btn.innerHTML =
          '<span class="spinner-border spinner-border-sm me-2"></span>验证中…';
        setTimeout(function () {
          btn.disabled = false;
          btn.innerHTML = '<i class="bi bi-box-arrow-in-right"></i> 登录后台';
          if (user && pass) {
            window.location.href = "dashboard.html";
          } else {
            err.style.display = "block";
          }
        }, 900);
      }
      document.addEventListener("keydown", function (e) {
        if (e.key === "Enter") doLogin();
      });
    </script>
  </body>
</html>
